<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Nhập hóa đơn</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Nhập Hóa đơn</h1>
  <a href="index.html">&larr; Trở về Trang chủ</a>
  <form>
    <div>
      <label>Nhà Cung Cấp: <input id="supplier" type="text"></label>
      <label>Số hóa đơn: <input id="invoiceNumber" type="text"></label>
      <label>Ngày: <input id="date" type="date"></label>
    </div>
    <table id="itemsTable">
      <thead>
        <tr>
          <th>Mã hàng</th>
          <th>Số lượng</th>
          <th>Đơn giá</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>
    <button type="button" id="addItem">Thêm dòng</button>
    <button type="button" id="saveInvoice">Lưu hóa đơn</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
