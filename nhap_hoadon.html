<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Nhập Hóa đơn bán lẻ</title>
  <link rel="stylesheet" href="style.css">
  <script src="FileSaver.min.js"></script>
  <script src="xlsx.full.min.js"></script>
  <script src="script.js"></script>
</head>
<body>
  <h1>🧾 Nhập Hóa đơn bán lẻ</h1>
  <form id="invoiceForm">
    <label>Ngày hóa đơn: <input type="date" id="ngayHD"></label>
    <label>Nhà cung cấp (NCC): <input type="text" id="ncc"></label>
    <label>Nơi nhận chung: <input type="text" id="noinhan"></label>
    <table id="invoiceTable">
      <thead>
        <tr>
          <th>Tên hàng</th><th>ĐVT</th><th>Số lượng</th><th>Đơn giá</th><th>Nơi nhận</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button type="button" onclick="addRow()">➕ Thêm dòng</button>
    <button type="button" onclick="saveInvoice()">💾 Lưu hóa đơn</button>
  </form>
  <a href="index.html" class="back">⬅ Quay lại</a>
</body>
</html>
