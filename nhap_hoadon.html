<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Nhập hóa đơn bán lẻ</title>
  <link rel="stylesheet" href="style.css" />
  <script src="xlsx.full.min.js"></script>
</head>
<body>
  <header>
    <h1>NHẬP HÓA ĐƠN BÁN LẺ</h1>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="nhap_hoadon.html">Nhập hóa đơn</a>
      <a href="de_nghi_vattu.html">Đề nghị vật tư</a>
      <a href="de_nghi_thanhtoan.html">Đề nghị thanh toán</a>
      <a href="baocao.html">Báo cáo</a>
    </nav>
  </header>

  <div class="container">
    <form id="invoiceForm">
      <label><b>Mã hóa đơn:</b> <span id="invoiceID" style="font-weight:bold;color:blue;"></span></label><br/><br/>

      <label>Nhà cung cấp: 
        <select id="nccSelect" required></select>
        <button type="button" class="btn secondary" id="updateNCC">Cập nhật NCC từ Excel</button>
      </label>
      <br/><br/>

      <label>Ngày hóa đơn: <input type="date" id="date" required /></label><br/><br/>

      <table>
        <thead>
          <tr>
            <th>STT</th><th>Tên vật tư</th><th>ĐVT</th><th>Số lượng</th>
            <th>Đơn giá</th><th>Thành tiền</th><th>Nơi nhận</th><th>Hành động</th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>

      <button type="button" class="btn" id="addItem">Thêm dòng</button><br/><br/>
      <button type="submit" class="btn">Lưu hóa đơn</button>
    </form>
  </div>

  <script>
    function formatMoney(value) {
      return Number(value).toLocaleString('vi-VN');
    }

    function unformatMoney(str) {
      return parseFloat(str.replace(/\./g, '')) || 0;
    }

    function getNextInvoiceID() {
      let invoices = JSON.parse(localStorage.getItem('hoadonList') || '[]');
      let nextNum = invoices.length + 1;
      return "BL" + nextNum.toString().padStart(3, '0');
    }

    function updateInvoiceID() {
      document.getElementById('invoiceID').innerText = getNextInvoiceID();
    }

    function addRow() {
      const tbody = document.getElementById('itemsBody');
      const row = tbody.insertRow();
      const idx = tbody.rows.length;
      row.insertCell(0).innerText = idx;
      row.insertCell(1).innerHTML = '<input class="ten" type="text" required />';
      row.insertCell(2).innerHTML = '<input class="dv" type="text" style="width:60px" />';
      row.insertCell(3).innerHTML = '<input class="sl" type="number" min="1" value="1" style="width:70px" />';
      row.insertCell(4).innerHTML = '<input class="dg" type="number" step="0.01" value="0" style="width:100px" />';
      row.insertCell(5).innerText = '0';
      row.insertCell(6).innerHTML = '<input class="noiNhan" type="text" />';
      row.insertCell(7).innerHTML = '<button type="button" class="btn danger" onclick="deleteRow(this)">Xóa</button>';

      const sl = row.querySelector('.sl');
      const dg = row.querySelector('.dg');
      sl.addEventListener('input', calcRow);
      dg.addEventListener('input', calcRow);
    }

    function deleteRow(btn) {
      const row = btn.closest('tr');
      row.remove();
      updateSTT();
    }

    function updateSTT() {
      const rows = document.querySelectorAll('#itemsBody tr');
      rows.forEach((r, i) => r.cells[0].innerText = i + 1);
    }

    function calcRow() {
      const row = this.closest('tr');
      const sl = parseFloat(row.querySelector('.sl').value) || 0;
      const dg = parseFloat(row.querySelector('.dg').value) || 0;
      row.cells[5].innerText = formatMoney(sl * dg);
    }

    // ====== NCC ======
    async function loadNCCFromExcel(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(sheet);
          const list = json.map(r => ({ ten: r.NCC || '', sdt: r.SDT || '' }));
          localStorage.setItem('nccList', JSON.stringify(list));
          resolve(list);
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    function renderNCC(list) {
      const sel = document.getElementById('nccSelect');
      sel.innerHTML = '<option value="">-- Chọn nhà cung cấp --</option>';
      list.forEach(ncc => {
        const opt = document.createElement('option');
        opt.value = ncc.ten;
        opt.textContent = `${ncc.ten} – ${ncc.sdt}`;
        opt.dataset.sdt = ncc.sdt;
        sel.appendChild(opt);
      });
    }

    function initNCC() {
      const saved = localStorage.getItem('nccList');
      if (saved) renderNCC(JSON.parse(saved));
    }

    document.getElementById('updateNCC').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.xlsx';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const list = await loadNCCFromExcel(file);
          renderNCC(list);
          alert('✅ Đã cập nhật danh sách NCC từ file Excel!');
        }
      };
      input.click();
    });

    // ====== FORM ======
    document.getElementById('addItem').addEventListener('click', addRow);
    addRow();
    updateInvoiceID();
    initNCC();

    document.getElementById('invoiceForm').addEventListener('submit', e => {
      e.preventDefault();
      const nccSel = document.getElementById('nccSelect');
      const tenNCC = nccSel.value;
      const sdtNCC = nccSel.selectedOptions[0]?.dataset.sdt || '';
      const date = document.getElementById('date').value;
      if (!tenNCC || !date) return alert("Vui lòng chọn NCC và ngày!");

      const rows = document.querySelectorAll('#itemsBody tr');
      const items = [];
      rows.forEach(r => {
        const ten = r.querySelector('.ten').value.trim();
        if (!ten) return;
        const dv = r.querySelector('.dv').value.trim();
        const sl = parseFloat(r.querySelector('.sl').value) || 0;
        const dg = parseFloat(r.querySelector('.dg').value) || 0;
        const total = sl * dg;
        const noiNhan = r.querySelector('.noiNhan').value.trim();
        items.push({ ten, dv, sl, dg, total, noiNhan });
      });

      if (items.length === 0) return alert("Phải có ít nhất 1 dòng vật tư!");

      let invoices = JSON.parse(localStorage.getItem('hoadonList') || '[]');
      const id = getNextInvoiceID();
      invoices.push({ id, ncc: { ten: tenNCC, sdt: sdtNCC }, date, items });
      localStorage.setItem('hoadonList', JSON.stringify(invoices));
      alert("💾 Đã lưu hóa đơn bán lẻ thành công!");
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
