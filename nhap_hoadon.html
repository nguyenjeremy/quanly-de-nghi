<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Nhập hóa đơn bán lẻ</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body onload="loadInvoices()">
  <h2>HÓA ĐƠN BÁN LẺ</h2>

  <div class="input-area">
    <input id="ncc" placeholder="Nhà cung cấp">
    <input id="ngay" type="date">
    <input id="tenhang" placeholder="Tên hàng">
    <input id="dvt" placeholder="ĐVT">
    <input id="soluong" type="number" placeholder="SL">
    <input id="dongia" type="number" placeholder="Đơn giá">
    <input id="noinhan" placeholder="Nơi nhận">
    <button onclick="addInvoice()">Thêm</button>
  </div>

  <table id="invoiceTable">
    <thead>
      <tr>
        <th>STT</th><th>Nhà cung cấp</th><th>Ngày</th>
        <th>Tên hàng</th><th>ĐVT</th><th>SL</th>
        <th>Đơn giá</th><th>Thành tiền</th><th>Nơi nhận</th><th>Xóa</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="buttons">
    <button onclick="saveInvoices()">Lưu</button>
    <button onclick="window.location='index.html'">Về menu</button>
  </div>
</body>
</html>
