<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Phiếu đề nghị mua vật tư</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>PHIẾU ĐỀ NGHỊ MUA VẬT TƯ</h1>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="nhap_hoadon.html">Nhập hóa đơn</a>
      <a href="de_nghi_vattu.html">Đề nghị vật tư</a>
      <a href="de_nghi_thanhtoan.html">Đề nghị thanh toán</a>
      <a href="baocao.html">Báo cáo</a>
    </nav>
  </header>

  <div class="container">
    <label>Chọn công ty:</label>
    <select id="companySelect">
      <option value="TT">Công ty TNHH Đầu Tư và Phát Triển Thư Thái</option>
      <option value="HT">Công ty TNHH MTV Gạch Tuynel Hiếu Thảo</option>
      <option value="TP">Công ty TNHH Gạch Tuynel Thanh Phong</option>
    </select>
    <br/><br/>

    <h3>Danh sách hóa đơn bán lẻ</h3>
    <table id="invoiceTable">
      <thead>
        <tr><th>Chọn</th><th>Mã HĐ</th><th>Ngày</th><th>Nhà cung cấp</th><th>Số dòng</th><th>Tổng tiền</th></tr>
      </thead>
      <tbody id="invoiceBody"></tbody>
    </table>

    <button class="btn" id="createVoucher">Tạo phiếu đề nghị</button>

    <div id="voucherContainer" style="display:none;margin-top:30px;">
      <button class="btn" id="printBtn">In A4</button>
      <button class="btn secondary" id="pdfBtn">Xuất PDF</button>
      <div id="voucher"></div>
    </div>
  </div>

  <script>
    const invoices = JSON.parse(localStorage.getItem('hoadonList') || '[]');
    const body = document.getElementById('invoiceBody');
    const voucherDiv = document.getElementById('voucher');

    function formatMoney(num) {
      return Number(num).toLocaleString('vi-VN');
    }

    function getNCC(inv) {
      if (!inv.ncc) return '(Chưa nhập NCC)';
      if (typeof inv.ncc === 'object') return `${inv.ncc.ten} – ${inv.ncc.sdt}`;
      return inv.ncc;
    }

    function loadTable() {
      if (invoices.length === 0) {
        body.innerHTML = '<tr><td colspan="6" style="text-align:center">Chưa có hóa đơn bán lẻ nào</td></tr>';
        return;
      }
      invoices.forEach(inv => {
        const total = inv.items.reduce((s, it) => s + it.total, 0);
        const row = body.insertRow();
        row.insertCell().innerHTML = '<input type="radio" name="chonHD">';
        row.insertCell().innerText = inv.id;
        row.insertCell().innerText = inv.date;
        row.insertCell().innerText = getNCC(inv);
        row.insertCell().innerText = inv.items.length;
        row.insertCell().innerText = formatMoney(total);
      });
    }

    document.getElementById('createVoucher').addEventListener('click', () => {
      const selected = document.querySelector('#invoiceBody input[type=radio]:checked');
      if (!selected) return alert('Vui lòng chọn một hóa đơn!');
      const row = selected.closest('tr');
      const id = row.cells[1].innerText;
      const invoice = invoices.find(x => x.id === id);
      const total = invoice.items.reduce((s, it) => s + it.total, 0);
      const cty = document.getElementById('companySelect').selectedOptions[0].text;
      const soPhieu = `${id.replace('BL','')}.${invoice.date.split('-').reverse().join('.')}/DNVT`;
      const nccText = getNCC(invoice);

      let html = `
        <div class="voucher">
          <div style="text-align:left;line-height:1.6">
            <b>${cty}</b><br/>
            <b>Số phiếu:</b> ${soPhieu}
          </div>
          <h2 style="text-align:center;margin:10px 0;">PHIẾU ĐỀ NGHỊ MUA VẬT TƯ</h2>
          <p><b>Ngày:</b> ${invoice.date}</p>
          <p><b>Nhà cung cấp:</b> ${nccText}</p>
          <table>
            <thead>
              <tr>
                <th>STT</th><th>Tên vật tư</th><th>ĐVT</th><th>SL</th>
                <th>Đơn giá</th><th>Thành tiền</th><th>Nơi nhận</th>
              </tr>
            </thead><tbody>
      `;
      invoice.items.forEach((it, idx) => {
        html += `
          <tr>
            <td>${idx + 1}</td>
            <td>${it.ten}</td>
            <td>${it.dv}</td>
            <td>${it.sl}</td>
            <td>${formatMoney(it.dg)}</td>
            <td>${formatMoney(it.total)}</td>
            <td>${it.noiNhan}</td>
          </tr>
        `;
      });
      html += `
          <tr>
            <td colspan="5" style="text-align:right"><b>Tổng cộng:</b></td>
            <td colspan="2"><b>${formatMoney(total)} VNĐ</b></td>
          </tr>
          </tbody></table>

          <div class="signature">
            <div>Người lập phiếu<br><br>(ký, ghi rõ họ tên)</div>
            <div>Người đề nghị<br><br>(ký, ghi rõ họ tên)</div>
            <div>Kiểm soát<br><br>(ký, ghi rõ họ tên)</div>
            <div>Giám đốc<br><br>(ký, ghi rõ họ tên)</div>
          </div>
        </div>
      `;
      voucherDiv.innerHTML = html;
      document.getElementById('voucherContainer').style.display = 'block';

      let dnvtList = JSON.parse(localStorage.getItem('dnvtList') || '[]');
      const dnvt = { id: soPhieu, ngay: invoice.date, cty, ncc: nccText, tongTien: total };
      dnvtList.push(dnvt);
      localStorage.setItem('dnvtList', JSON.stringify(dnvtList));
      // ❌ Không hiện alert nữa
    });

    document.getElementById('printBtn').addEventListener('click', () => window.print());

    document.getElementById('pdfBtn').addEventListener('click', () => {
      const voucher = document.getElementById('voucher');
      const d = new Date();
      const fileName = `DNVT_${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}.pdf`;
      html2canvas(voucher, { scale: 2 }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        const pageWidth = pdf.internal.pageSize.getWidth();
        const imgHeight = canvas.height * pageWidth / canvas.width;
        pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, imgHeight);
        pdf.save(fileName);
      });
    });

    loadTable();
  </script>
</body>
</html>
