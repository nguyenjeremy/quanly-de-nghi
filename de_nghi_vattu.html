<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đề nghị mua vật tư</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ĐỀ NGHỊ MUA VẬT TƯ</h2>
  <a href="index.html">&larr; Trở về Trang chủ</a>

  <table class="info-table">
    <tr>
      <td>Nhà cung cấp: <span id="vattuSupplier"></span></td>
      <td>Số HĐ: <span id="vattuInvoice"></span></td>
      <td>Ngày: <span id="vattuDate"></span></td>
    </tr>
  </table>

  <p><strong>Bộ phận LGHT đề nghị cung cấp:</strong></p>
  <table id="vattuTable">
    <thead>
      <tr>
        <th>STT</th><th>Mã hàng</th><th>Đơn vị</th><th>Số lượng</th><th>Ghi chú</th>
      </tr>
    </thead>
    <tbody id="vattuBody"></tbody>
  </table>

  <table class="signature-table">
    <tr>
      <td>Người lập đề nghị<br><br><br>(Ký, họ tên)</td>
      <td>Thủ trưởng bộ phận<br><br><br>(Ký, họ tên)</td>
      <td>Kế toán trưởng<br><br><br>(Ký, họ tên)</td>
      <td>Giám đốc<br><br><br>(Ký, họ tên)</td>
    </tr>
  </table>

  <button onclick="window.print()" class="no-print">In trực tiếp</button>
  <script src="script.js"></script>
</body>
</html>
