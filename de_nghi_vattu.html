<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Phiếu đề nghị mua vật tư</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>PHIẾU ĐỀ NGHỊ MUA VẬT TƯ</h1>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="nhap_hoadon.html">Nhập hóa đơn</a>
      <a href="de_nghi_vattu.html">Đề nghị vật tư</a>
      <a href="de_nghi_thanhtoan.html">Đề nghị thanh toán</a>
      <a href="baocao.html">Báo cáo</a>
    </nav>
  </header>

  <div class="container">
    <label>Chọn công ty:</label>
    <select id="companySelect">
      <option value="TT">Công ty TNHH Đầu Tư và Phát Triển Thư Thái</option>
      <option value="HT">Công ty TNHH MTV Gạch Tuynel Hiếu Thảo</option>
      <option value="TP">Công ty TNHH Gạch Tuynel Thanh Phong</option>
    </select>
    <button class="btn" id="printAll">In tất cả phiếu</button>

    <div id="vouchers"></div>
  </div>

  <script>
    const invoices = JSON.parse(localStorage.getItem('hoadonList') || '[]');
    const vouchers = document.getElementById('vouchers');

    function formatMoney(num) {
      return Number(num).toLocaleString("vi-VN");
    }

    function getToday() {
      const d = new Date();
      return `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
    }

    function renderVouchers() {
      vouchers.innerHTML = '';
      invoices.forEach((inv, i) => {
        const total = inv.items.reduce((s, it) => s + it.total, 0);
        const soPhieu = `${i + 1}.${inv.date.split('-').reverse().join('.')}/DNVT`;
        let html = `
        <div class="voucher">
          <h2>PHIẾU ĐỀ NGHỊ MUA VẬT TƯ</h2>
          <p><b>Đơn vị:</b> <span class="ctyName"></span></p>
          <p><b>Số phiếu:</b> ${soPhieu}</p>
          <p><b>Ngày:</b> ${inv.date}</p>
          <p><b>Nhà cung cấp:</b> ${inv.ncc}</p>
          <table>
            <thead>
              <tr>
                <th>STT</th><th>Tên vật tư</th><th>ĐVT</th><th>SL</th><th>Đơn giá</th><th>Thành tiền</th><th>Nơi nhận</th>
              </tr>
            </thead>
            <tbody>
        `;
        inv.items.forEach((it, idx) => {
          html += `
            <tr>
              <td>${idx + 1}</td>
              <td>${it.ten}</td>
              <td>${it.dv}</td>
              <td>${it.sl}</td>
              <td>${formatMoney(it.dg)}</td>
              <td>${formatMoney(it.total)}</td>
              <td>${it.noiNhan}</td>
            </tr>
          `;
        });
        html += `
            <tr>
              <td colspan="5" style="text-align:right"><b>Tổng cộng:</b></td>
              <td colspan="2"><b>${formatMoney(total)}</b></td>
            </tr>
            </tbody>
          </table>
          <div class="signature">
            <div>Người đề nghị<br><br>(ký, ghi rõ họ tên)</div>
            <div>Người kiểm soát<br><br>(ký, ghi rõ họ tên)</div>
            <div>Kế toán trưởng<br><br>(ký, ghi rõ họ tên)</div>
            <div>Giám đốc<br><br>(ký, ghi rõ họ tên)</div>
          </div>
        </div>`;
        vouchers.insertAdjacentHTML('beforeend', html);
      });
      updateCompanyName();
    }

    function updateCompanyName() {
      const cty = document.getElementById('companySelect');
      const name = cty.options[cty.selectedIndex].text;
      document.querySelectorAll('.ctyName').forEach(el => el.innerText = name);
    }

    document.getElementById('companySelect').addEventListener('change', updateCompanyName);
    document.getElementById('printAll').addEventListener('click', () => window.print());

    renderVouchers();
  </script>
</body>
</html>
