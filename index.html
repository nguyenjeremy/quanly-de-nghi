<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Hệ thống quản lý hóa đơn</title>
  <link rel="stylesheet" href="style.css" />
  <script src="FileSaver.min.js"></script>
  <script src="xlsx.full.min.js"></script>
</head>
<body>
  <header>
    <h1>Hệ thống quản lý hóa đơn</h1>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="nhap_hoadon.html">Nhập hóa đơn</a>
      <a href="de_nghi_vattu.html">Đề nghị vật tư</a>
      <a href="de_nghi_thanhtoan.html">Đề nghị thanh toán</a>
      <a href="baocao.html">Báo cáo</a>
    </nav>
  </header>
  <div class="container">
    <h2>Danh sách hóa đơn</h2>
    <div id="invoiceTable"></div>
    <button class="btn danger" id="deleteAll">Xóa toàn bộ</button>
    <button class="btn secondary" id="backupJSON">Lưu ra JSON</button>
    <input type="file" id="fileInput" style="display:none" />
    <button class="btn" id="loadJSON">Tải từ JSON</button>
  </div>
  <script>
    let invoices = JSON.parse(localStorage.getItem('hoadonList') || '[]');
    function renderTable() {
      let html = '<table><thead><tr><th>Số HĐ</th><th>Ngày</th><th>Số dòng</th><th>Hành động</th></tr></thead><tbody>';
      for(let i = 0; i < invoices.length; i++) {
        const inv = invoices[i];
        html += `<tr>
                   <td>${inv.id}</td>
                   <td>${inv.date}</td>
                   <td>${inv.items.length}</td>
                   <td>
                     <button class="btn danger" onclick="deleteInvoice(${i})">Xóa</button>
                   </td>
                 </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('invoiceTable').innerHTML = html;
    }
    function deleteInvoice(index) {
      if(confirm('Xác nhận xóa hóa đơn này?')) {
        invoices.splice(index, 1);
        localStorage.setItem('hoadonList', JSON.stringify(invoices));
        renderTable();
      }
    }
    function deleteAll() {
      if(confirm('Xác nhận xóa toàn bộ hóa đơn?')) {
        invoices = [];
        localStorage.removeItem('hoadonList');
        renderTable();
      }
    }
    function backupJSON() {
      const data = JSON.stringify(invoices, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      saveAs(blob, 'backup_hoadon.json');
    }
    function loadJSON() {
      document.getElementById('fileInput').click();
    }
    document.getElementById('fileInput').addEventListener('change', function(e){
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const obj = JSON.parse(evt.target.result);
          if(Array.isArray(obj)) {
            invoices = obj;
            localStorage.setItem('hoadonList', JSON.stringify(invoices));
            renderTable();
          } else {
            alert('Dữ liệu không hợp lệ!');
          }
        } catch(err) {
          alert('Lỗi khi đọc file!');
        }
      };
      reader.readAsText(file);
    });
    document.getElementById('deleteAll').addEventListener('click', deleteAll);
    document.getElementById('backupJSON').addEventListener('click', backupJSON);
    document.getElementById('loadJSON').addEventListener('click', loadJSON);
    renderTable();
  </script>
</body>
</html>
