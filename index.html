<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Trang chủ - Quản lý hóa đơn</title>
  <link rel="stylesheet" href="style.css" />
  <script src="FileSaver.min.js"></script>
  <script src="xlsx.full.min.js"></script>
</head>
<body>
  <header>
    <h1>HỆ THỐNG QUẢN LÝ HÓA ĐƠN BÁN LẺ</h1>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="nhap_hoadon.html">Nhập hóa đơn</a>
      <a href="de_nghi_vattu.html">Đề nghị vật tư</a>
      <a href="de_nghi_thanhtoan.html">Đề nghị thanh toán</a>
      <a href="baocao.html">Báo cáo</a>
    </nav>
  </header>

  <div class="container">
    <h2>📅 Danh sách chứng từ trong ngày</h2>
    <div id="todayInfo"></div>
    <hr>

    <h3>🧾 Hóa đơn bán lẻ</h3>
    <div id="invoiceTable"></div>

    <h3>📄 Phiếu đề nghị vật tư</h3>
    <div id="dnvtTable"></div>

    <h3>💰 Phiếu đề nghị thanh toán</h3>
    <div id="dnttTable"></div>

    <hr>
    <button class="btn secondary" id="backupJSON">💾 Lưu toàn bộ ra JSON</button>
    <input type="file" id="fileInput" style="display:none" />
    <button class="btn" id="loadJSON">📂 Tải từ JSON</button>
  </div>

  <script>
    // ======== HÀM CHUNG ========
    function formatMoney(num) {
      return Number(num).toLocaleString("vi-VN");
    }

    function parseDate(str) {
      if (!str) return null;
      const parts = str.split(/[\/\-\.]/).map(Number);
      if (parts.length === 3) {
        const [a, b, c] = parts;
        const [d, m, y] = a > 31 ? [c, b, a] : [a, b, c];
        return new Date(y, m - 1, d);
      }
      return null;
    }

    function isToday(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return false;
      const today = new Date();
      return d.getDate() === today.getDate() &&
             d.getMonth() === today.getMonth() &&
             d.getFullYear() === today.getFullYear();
    }

    // ======== DỮ LIỆU ========
    const invoices = JSON.parse(localStorage.getItem('hoadonList') || '[]');
    const dnvtList = JSON.parse(localStorage.getItem('dnvtList') || '[]');
    const dnttList = JSON.parse(localStorage.getItem('dnttList') || '[]');

    // ======== HIỂN THỊ NGÀY ========
    const today = new Date();
    const ngayText = `Ngày ${today.getDate()} tháng ${today.getMonth()+1} năm ${today.getFullYear()}`;
    document.getElementById('todayInfo').innerHTML = `<b>${ngayText}</b>`;

    // ======== HÓA ĐƠN TRONG NGÀY ========
    function renderInvoices() {
      const list = invoices.filter(inv => isToday(inv.date));
      if (list.length === 0) {
        document.getElementById('invoiceTable').innerHTML = '<p>Không có hóa đơn bán lẻ nào hôm nay.</p>';
        return;
      }

      let html = `
        <table>
          <thead><tr>
            <th>Mã HĐ</th><th>Ngày</th><th>Nhà cung cấp</th><th>SĐT</th>
            <th>Số dòng</th><th>Tổng tiền</th>
          </tr></thead><tbody>
      `;
      list.forEach(inv => {
        const sum = inv.items.reduce((s, it) => s + it.total, 0);
        const ten = typeof inv.ncc === 'object' ? inv.ncc.ten : inv.ncc;
        const sdt = typeof inv.ncc === 'object' ? inv.ncc.sdt : '';
        html += `<tr>
          <td>${inv.id}</td><td>${inv.date}</td><td>${ten}</td><td>${sdt}</td>
          <td>${inv.items.length}</td><td>${formatMoney(sum)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('invoiceTable').innerHTML = html;
    }

    // ======== DNVT TRONG NGÀY ========
    function renderDNVT() {
      const list = dnvtList.filter(x => isToday(x.ngay));
      if (list.length === 0) {
        document.getElementById('dnvtTable').innerHTML = '<p>Không có phiếu đề nghị vật tư hôm nay.</p>';
        return;
      }

      let html = `
        <table>
          <thead><tr>
            <th>Số phiếu</th><th>Ngày</th><th>Công ty</th><th>Nhà cung cấp</th><th>Tổng tiền</th>
          </tr></thead><tbody>
      `;
      list.forEach(p => {
        html += `<tr>
          <td>${p.id}</td><td>${p.ngay}</td><td>${p.cty}</td><td>${p.ncc}</td><td>${formatMoney(p.tongTien)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('dnvtTable').innerHTML = html;
    }

    // ======== DNTT TRONG NGÀY ========
    function renderDNTT() {
      const list = dnttList.filter(x => isToday(x.ngay));
      if (list.length === 0) {
        document.getElementById('dnttTable').innerHTML = '<p>Không có phiếu đề nghị thanh toán hôm nay.</p>';
        return;
      }

      let html = `
        <table>
          <thead><tr>
            <th>Số phiếu</th><th>Ngày</th><th>Công ty</th><th>Nhà cung cấp</th><th>Tổng tiền</th><th>Nội dung</th>
          </tr></thead><tbody>
      `;
      list.forEach(p => {
        html += `<tr>
          <td>${p.id}</td><td>${p.ngay}</td><td>${p.cty}</td><td>${p.ncc}</td>
          <td>${formatMoney(p.tongTien)}</td><td>${p.noiDung || ''}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('dnttTable').innerHTML = html;
    }

    // ======== BACKUP / LOAD JSON ========
    document.getElementById("backupJSON").addEventListener("click", () => {
      const allData = { invoices, dnvtList, dnttList };
      const blob = new Blob([JSON.stringify(allData, null, 2)], { type: "application/json" });
      saveAs(blob, "Backup_HeThong.json");
    });

    document.getElementById("loadJSON").addEventListener("click", () => {
      document.getElementById("fileInput").click();
    });

    document.getElementById("fileInput").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const data = JSON.parse(evt.target.result);
          if (data.invoices && data.dnvtList && data.dnttList) {
            localStorage.setItem('hoadonList', JSON.stringify(data.invoices));
            localStorage.setItem('dnvtList', JSON.stringify(data.dnvtList));
            localStorage.setItem('dnttList', JSON.stringify(data.dnttList));
            alert("✅ Đã nạp dữ liệu thành công!");
            location.reload();
          } else {
            alert("❌ File JSON không hợp lệ!");
          }
        } catch {
          alert("❌ Lỗi khi đọc file JSON!");
        }
      };
      reader.readAsText(file);
    });

    // ======== CHẠY ========
    renderInvoices();
    renderDNVT();
    renderDNTT();
  </script>
</body>
</html>
