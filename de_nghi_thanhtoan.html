<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đề nghị thanh toán</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ĐỀ NGHỊ THANH TOÁN</h2>
  <a href="index.html">&larr; Trở về Trang chủ</a>

  <p style="text-align:right;">Ngày: <span id="paymentDate"></span></p>
  <table id="paymentTable">
    <thead>
      <tr>
        <th>STT</th><th>Nội dung thanh toán</th><th>ĐVT</th><th>Số lượng</th><th>Đơn giá</th><th>Thành tiền</th>
      </tr>
    </thead>
    <tbody id="paymentBody"></tbody>
  </table>

  <p><strong>Chi phí thanh toán:</strong> <span id="cost"></span> VNĐ</p>

  <table class="signature-table">
    <tr>
      <td>Người lập đề nghị<br><br><br>(Ký, họ tên)</td>
      <td>Thủ trưởng bộ phận<br><br><br>(Ký, họ tên)</td>
      <td>Kế toán trưởng<br><br><br>(Ký, họ tên)</td>
      <td>Giám đốc<br><br><br>(Ký, họ tên)</td>
    </tr>
  </table>

  <button onclick="window.print()" class="no-print">In trực tiếp</button>
  <script src="script.js"></script>

</html>
