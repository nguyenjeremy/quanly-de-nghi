<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Giấy đề nghị thanh toán</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .voucher-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .voucher-header .unit {
      font-weight: bold;
      text-align: left;
    }
    .voucher-header h2 {
      flex: 1;
      text-align: center;
      margin: 0;
      padding-right: 120px; /* để giữ căn giữa khi có Đơn vị bên trái */
    }
    @media print {
      .voucher-header h2 {
        padding-right: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>GIẤY ĐỀ NGHỊ THANH TOÁN</h1>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="nhap_hoadon.html">Nhập hóa đơn</a>
      <a href="de_nghi_vattu.html">Đề nghị vật tư</a>
      <a href="de_nghi_thanhtoan.html">Đề nghị thanh toán</a>
      <a href="baocao.html">Báo cáo</a>
    </nav>
  </header>

  <div class="container">
    <label>Chọn công ty:</label>
    <select id="companySelect">
      <option value="TT">Công ty TNHH Đầu Tư và Phát Triển Thư Thái</option>
      <option value="HT">Công ty TNHH MTV Gạch Tuynel Hiếu Thảo</option>
      <option value="TP">Công ty TNHH Gạch Tuynel Thanh Phong</option>
    </select>

    <table id="itemsTable">
      <thead>
        <tr>
          <th>Chọn</th><th>Ngày</th><th>Tên hàng</th><th>ĐVT</th>
          <th>SL</th><th>Đơn giá</th><th>Thành tiền</th><th>Nơi nhận</th><th>Nhà CC</th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>

    <button class="btn" id="createVoucher">Tạo phiếu thanh toán</button>

    <div id="voucherContainer" style="display:none;margin-top:30px;">
      <button class="btn" id="printBtn">In A4</button>
      <div id="voucher"></div>
    </div>
  </div>

  <script>
    const invoices = JSON.parse(localStorage.getItem('hoadonList') || '[]');
    const body = document.getElementById('itemsBody');

    function formatMoney(num) {
      return Number(num).toLocaleString('vi-VN');
    }

    // ======= Hiển thị danh sách chi tiết hàng hóa =======
    invoices.forEach(inv => {
      const nccTen = typeof inv.ncc === 'object' ? inv.ncc.ten : inv.ncc;
      inv.items.forEach(it => {
        const row = body.insertRow();
        row.insertCell().innerHTML = '<input type="checkbox">';
        row.insertCell().innerText = inv.date;
        row.insertCell().innerText = it.ten;
        row.insertCell().innerText = it.dv;
        row.insertCell().innerText = it.sl;
        row.insertCell().innerText = formatMoney(it.dg);
        row.insertCell().innerText = formatMoney(it.total);
        row.insertCell().innerText = it.noiNhan;
        row.insertCell().innerText = nccTen;
      });
    });

    // ======= Tạo phiếu thanh toán =======
    document.getElementById('createVoucher').addEventListener('click', () => {
      const selected = Array.from(document.querySelectorAll('#itemsBody input[type=checkbox]:checked'));
      if (selected.length === 0) return alert('Chưa chọn dòng nào!');

      let rows = '';
      let total = 0;
      let nccSet = new Set();

      selected.forEach(chk => {
        const r = chk.closest('tr');
        const t = parseFloat(r.cells[6].innerText.replace(/\./g,'')) || 0;
        total += t;
        nccSet.add(r.cells[8].innerText);
        rows += `<tr>
          <td>${r.cells[1].innerText}</td>
          <td>${r.cells[2].innerText}</td>
          <td>${r.cells[3].innerText}</td>
          <td>${r.cells[4].innerText}</td>
          <td>${r.cells[5].innerText}</td>
          <td>${r.cells[6].innerText}</td>
          <td>${r.cells[7].innerText}</td>
          <td>${r.cells[8].innerText}</td>
        </tr>`;
      });

      const d = new Date();
      const soPhieu = `1.${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}/DNTT`;

      const html = `
        <div class="voucher">
          <div class="voucher-header">
            <div class="unit">Đơn vị: Công ty TNHH Đầu Tư và Phát Triển Thư Thái</div>
            <h2>GIẤY ĐỀ NGHỊ THANH TOÁN</h2>
          </div>
          <p><b>Số phiếu:</b> ${soPhieu}</p>
          <p><b>Ngày:</b> ${d.toLocaleDateString('vi-VN')}</p>
          <p><b>Nhà cung cấp:</b> ${Array.from(nccSet).join(', ')}</p>
          <table>
            <thead><tr>
              <th>Ngày mua</th><th>Tên hàng</th><th>ĐVT</th><th>SL</th>
              <th>Đơn giá</th><th>Thành tiền</th><th>Nơi nhận</th><th>Nhà CC</th>
            </tr></thead>
            <tbody>${rows}
              <tr>
                <td colspan="5" style="text-align:right"><b>Tổng chi phí:</b></td>
                <td colspan="3"><b>${formatMoney(total)} VNĐ</b></td>
              </tr>
            </tbody>
          </table>
          <p><b>Người thụ hưởng:</b> Nguyễn Hữu Công – STK: 6513748359 – Ngân hàng BIDV</p>
          <div class="signature">
            <div>Người đề nghị<br><br>(ký, ghi rõ họ tên)</div>
            <div>Người kiểm soát<br><br>(ký, ghi rõ họ tên)</div>
            <div>Kế toán trưởng<br><br>(ký, ghi rõ họ tên)</div>
            <div>Giám đốc<br><br>(ký, ghi rõ họ tên)</div>
          </div>
        </div>`;
      document.getElementById('voucher').innerHTML = html;
      document.getElementById('voucherContainer').style.display = 'block';
    });

    document.getElementById('printBtn').addEventListener('click', () => window.print());
  </script>
</body>
</html>
